---
services:
  lab-drop:
    container_name: lab-drop
    # Built locally from this repo (no registry). Run `docker compose build` or
    # `docker compose up --build`. The Dockerfile produces the combined image.
    image: lab-drop:latest
    build: .
    privileged: true
    #network_mode: host # for monitoring network usage stats. run `sudo ufw allow 2022/tcp` on ubuntu to allow access through firewall
    ports:
      - 2022:2022
    environment:
      # SECRET is optional. If omitted, a random per-install secret is generated
      # and persisted to the config volume (/config/.secret) on first run.
      # Only set it if you want to manage the key yourself (e.g. `openssl rand -base64 32`).
      # Do NOT reuse a placeholder value — a shared secret defeats the encryption.
      # - SECRET=CHANGE_ME_TO_A_RANDOM_VALUE
    volumes:
      - /sys:/sys:ro
      # Point these at existing /docker/lab-dash/* paths instead if you want to
      # carry over your current config/uploads.
      - /docker/lab-drop/config:/config
      - /docker/lab-drop/uploads:/app/public/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
