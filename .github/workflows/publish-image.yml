name: Publish image to GHCR

# Builds the combined lab-drop image (security-hardened backend + free-2D layout)
# and pushes a multi-arch image to GitHub Container Registry.
#
# Triggers on version tags (e.g. `git tag v1.3.7 && git push origin v1.3.7`)
# and on-demand via the Actions tab.
#
# One-time setup after the first successful run: open the package at
# github.com/plongitudes/lab-drop/pkgs/container/lab-drop and set its
# visibility to Public so unraid can pull it without authentication.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/plongitudes/lab-drop
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
